spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: geekTech
  datasource:
    url: jdbc:mysql://localhost:3306/geekTech
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: ${JWT_SECRET}
  expiration-hours: ${JWT_EXPIRATION_HOURS}

admin:
  name: ${ADMIN_NAME}
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}
cloudinary:
  url: ${CLOUDINARY_URL}