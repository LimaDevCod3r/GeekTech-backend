spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:h2:mem:geektech;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-change-me-before-production}
  expiration-hours: ${JWT_EXPIRATION_HOURS:2}

admin:
  name: ${ADMIN_NAME:Admin}
  email: ${ADMIN_EMAIL:admin@geektech.com}
  password: ${ADMIN_PASSWORD:admin12345}
